<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="products/product.css?v=13">
</head>
<body class="product-page-loading" data-product-slug="">

<nav>
  <a href="index.html" class="logo">Afro<em>hörnan</em></a>
  <ul class="nav-links">
    <li><a href="har.html">Hårvård</a></li>
    <li><a href="kosmetika.html">Skönhet</a></li>
    <li><a href="mat.html">Mat</a></li>
    <li><a href="accessoarer.html">Accessoarer</a></li>
  </ul>
  <div class="nav-right">
    <a href="profile.html" class="nav-profile" aria-label="Mitt konto">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
    <button class="nav-cart-btn" type="button" aria-label="Varukorg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge" id="cartCount">0</span>
    </button>
  </div>
</nav>

<main class="product-main">
  <nav class="breadcrumb" aria-label="Brödsmulor">
    <a href="index.html">Hem</a> /
    <a href="kosmetika.html">Sortiment</a> /
    <span id="productBreadcrumbName">Produkt</span>
  </nav>

  <div class="product-layout" id="productLayout">
    <div class="product-gallery">
      <div class="product-gallery-img">
        <div class="product-img-placeholder" id="productImgPlaceholder" aria-hidden="true"></div>
        <img id="productMainImage" src="" alt="" hidden decoding="async">
        <span class="product-badge" id="productBadge" hidden></span>
        <button type="button" class="product-fav" id="productFavBtn" hidden aria-label="Spara favorit">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
    </div>

    <div class="product-details">
      <p class="product-brand" id="productBrand">&nbsp;</p>
      <h1 id="productTitle">Produkt</h1>
      <p class="product-price" id="productPrice">&nbsp;</p>

      <p class="product-colors-hint" id="productColorsHint" hidden>Flera varianter</p>

      <div class="product-variant-skeleton" id="productVariantSkeleton" hidden aria-hidden="true">
        <p class="product-colors-label">Varianter</p>
        <div class="product-variant-skeleton-swatches">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="product-colors" id="productColors" hidden>
        <p class="product-colors-label">Varianter</p>
        <div class="product-color-swatches" id="productColorSwatches" role="radiogroup" aria-label="Välj variant"></div>
        <p class="product-color-selected" id="productColorSelected"></p>
      </div>

      <hr class="product-divider">

      <p class="product-desc" id="productDesc">&nbsp;</p>

      <hr class="product-divider">

      <p class="product-qty-label">Antal</p>
      <div class="product-qty-row">
        <button type="button" class="qty-btn" id="qtyMinus" aria-label="Minska antal" disabled>−</button>
        <span id="qty">1</span>
        <button type="button" class="qty-btn" id="qtyPlus" aria-label="Öka antal" disabled>+</button>
        <span id="total">&nbsp;</span>
      </div>

      <button type="button" class="btn-buy-product" id="buyBtn" disabled>Köp nu</button>
    </div>
  </div>
</main>

</body>
</html>
